<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gabarito — SAEBTrack</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/gabarito.css">
</head>
<body>
  <nav class="navbar" data-navbar>
    <a href="dashboard.html" class="navbar-logo">
      <img src="images/logo.png" alt="SAEBTrack" class="logo-img">
    </a>
    <button type="button" class="navbar-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="navbar-panel">
      <i data-lucide="menu" class="icon icon-md navbar-icon-menu" aria-hidden="true"></i>
      <i data-lucide="x" class="icon icon-md navbar-icon-close" aria-hidden="true"></i>
    </button>
    <div class="navbar-panel" id="navbar-panel">
      <div class="navbar-panel-user">
        <div class="avatar" aria-hidden="true">GS</div>
        <div class="navbar-user-info">
          <div class="navbar-user-name">Gisely Sales</div>
          <div class="navbar-user-meta">3A</div>
        </div>
      </div>
      <ul class="navbar-menu">
        <li>
          <a href="dashboard.html">
            <i data-lucide="layout-dashboard" class="icon icon-sm" aria-hidden="true"></i>
            Dashboard
          </a>
        </li>
        <li>
          <a href="simulado.html">
            <i data-lucide="play-circle" class="icon icon-sm" aria-hidden="true"></i>
            Simulado
          </a>
        </li>
        <li>
          <a href="ranking.html">
            <i data-lucide="trophy" class="icon icon-sm" aria-hidden="true"></i>
            Ranking
          </a>
        </li>
        <li>
          <a href="perfil.html">
            <i data-lucide="user" class="icon icon-sm" aria-hidden="true"></i>
            Perfil
          </a>
        </li>
      </ul>
    </div>
    <div class="navbar-user navbar-user-desktop">
      <div class="navbar-user-info">
        <div class="navbar-user-name">Gisely Sales</div>
        <div class="navbar-user-meta">3A</div>
      </div>
      <div class="avatar" aria-hidden="true">GS</div>
    </div>
    <div class="navbar-backdrop" aria-hidden="true"></div>
  </nav>

  <main class="page-container">

    <div class="desempenho-card">
      <div class="desempenho-barra-topo"></div>
      <h2 class="desempenho-titulo">Desempenho</h2>
      <div class="placar">
        <span class="placar-numero" id="placar-numero">0</span>
        <span class="placar-total">/ 5</span>
      </div>
      <p class="placar-label">Questões corretas</p>
      <div class="metricas-grid">
        <div class="metrica-card">
          <i data-lucide="target" class="icon metrica-icone-lucide" aria-hidden="true"></i>
          <span class="metrica-valor" id="metrica-precisao">0%</span>
          <span class="metrica-label">Precisão</span>
        </div>
        <div class="metrica-card destaque">
          <i data-lucide="trophy" class="icon metrica-icone-lucide" aria-hidden="true"></i>
          <span class="metrica-valor" id="metrica-xp">+0 XP</span>
          <span class="metrica-label">XP Ganho</span>
        </div>
      </div>
      <div class="nivel-badge inline-icon-row">
        <i data-lucide="zap" class="icon icon-sm" aria-hidden="true"></i>
        <span>Seu nível atual: Desafiador</span>
      </div>
    </div>

    <h2 class="revisao-titulo">Revisão do Simulado</h2>
    <div class="revisao-lista" id="revisao-lista">
      <!-- preenchido por gabarito.js -->
    </div>

    <div class="gabarito-acoes">
      <a href="simulado.html" class="btn-primary btn-with-icon gabarito-btn">
        <i data-lucide="rotate-cw" class="icon icon-sm" aria-hidden="true"></i>
        Novo Simulado
      </a>
      <a href="dashboard.html" class="btn-secondary btn-with-icon gabarito-btn">
        <i data-lucide="home" class="icon icon-sm" aria-hidden="true"></i>
        Voltar ao Dashboard
      </a>
    </div>

  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/global.js"></script>
  <script src="js/gabarito.js"></script>
</body>
</html>
