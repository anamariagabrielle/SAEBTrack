<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil — SAEBTrack</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/perfil.css">
</head>
<body>
  <nav class="navbar" data-navbar>
    <a href="dashboard.html" class="navbar-logo">
      <img src="images/logo.png" alt="SAEBTrack" class="logo-img">
    </a>
    <button type="button" class="navbar-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="navbar-panel">
      <i data-lucide="menu" class="icon icon-md navbar-icon-menu" aria-hidden="true"></i>
      <i data-lucide="x" class="icon icon-md navbar-icon-close" aria-hidden="true"></i>
    </button>
    <div class="navbar-panel" id="navbar-panel">
      <div class="navbar-panel-user">
        <div class="avatar" aria-hidden="true">GS</div>
        <div class="navbar-user-info">
          <div class="navbar-user-name">Gisely Sales</div>
          <div class="navbar-user-meta">3A</div>
        </div>
      </div>
      <ul class="navbar-menu">
        <li>
          <a href="dashboard.html">
            <i data-lucide="layout-dashboard" class="icon icon-sm" aria-hidden="true"></i>
            Dashboard
          </a>
        </li>
        <li>
          <a href="simulado.html">
            <i data-lucide="play-circle" class="icon icon-sm" aria-hidden="true"></i>
            Simulado
          </a>
        </li>
        <li>
          <a href="ranking.html">
            <i data-lucide="trophy" class="icon icon-sm" aria-hidden="true"></i>
            Ranking
          </a>
        </li>
        <li>
          <a href="perfil.html" class="active">
            <i data-lucide="user" class="icon icon-sm" aria-hidden="true"></i>
            Perfil
          </a>
        </li>
      </ul>
    </div>
    <div class="navbar-user navbar-user-desktop">
      <div class="navbar-user-info">
        <div class="navbar-user-name">Gisely Sales</div>
        <div class="navbar-user-meta">3A</div>
      </div>
      <div class="avatar" aria-hidden="true">GS</div>
    </div>
    <div class="navbar-backdrop" aria-hidden="true"></div>
  </nav>

  <main class="page-container">

    <div class="perfil-card">
      <div class="avatar-grande azul">GS</div>
      <div class="perfil-info">
        <h1 class="perfil-nome">Gisely Sales</h1>
        <p class="perfil-escola">E.E. Raimundo Nonato</p>
        <div class="perfil-badges">
          <span class="badge-turma">3º Ano A - 3A</span>
          <span class="badge-nivel inline-icon-row">
            <i data-lucide="zap" class="icon icon-xs" aria-hidden="true"></i>
            Desafiador
          </span>
        </div>
      </div>
      <button type="button" class="btn-editar btn-with-icon">
        <i data-lucide="settings" class="icon icon-sm" aria-hidden="true"></i>
        Editar Perfil
      </button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-icon azul">
          <i data-lucide="layout-grid" class="icon icon-md" aria-hidden="true"></i>
        </span>
        <span class="stat-valor">7</span>
        <span class="stat-label">TOTAL SIMULADOS</span>
      </div>
      <div class="stat-card">
        <span class="stat-icon roxo">
          <i data-lucide="target" class="icon icon-md" aria-hidden="true"></i>
        </span>
        <span class="stat-valor">35</span>
        <span class="stat-label">QUESTÕES FEITAS</span>
      </div>
      <div class="stat-card">
        <span class="stat-icon verde">
          <i data-lucide="trophy" class="icon icon-md" aria-hidden="true"></i>
        </span>
        <span class="stat-valor">68%</span>
        <span class="stat-label">MÉDIA DE ACERTO</span>
      </div>
      <div class="stat-card">
        <span class="stat-icon laranja">
          <i data-lucide="flame" class="icon icon-md" aria-hidden="true"></i>
        </span>
        <span class="stat-valor">5 dias</span>
        <span class="stat-label">SEQUÊNCIA</span>
      </div>
    </div>

    <div class="conquistas-header">
      <h2>Minhas Conquistas</h2>
      <span class="text-gray">3 / 6</span>
    </div>
    <div class="conquistas-grid-perfil" id="conquistas-grid">
      <!-- preenchido por JS -->
    </div>

  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/global.js"></script>
  <script src="js/perfil.js"></script>
</body>
</html>
