<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAEBTrack</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="page-selection">
  <div class="selection-container">
    <div class="selection-logo">
      <i data-lucide="brain" class="icon icon-lg logo-icon" aria-hidden="true"></i>
      <span class="logo-text">SAEBTrack</span>
      <span class="logo-badge badge badge-green">Prepare-se para o SAEB</span>
      <p class="logo-subtitle">Do Piauí para o Mundo</p>
    </div>

    <div class="cards-grid">
      <a href="login.html?perfil=aluno" class="profile-card">
        <div class="card-icon-box green" aria-hidden="true">
          <i data-lucide="graduation-cap" class="icon"></i>
        </div>
        <h2 class="card-title">Sou Aluno</h2>
        <p class="card-subtitle">Pratique, suba de nível e detone no SAEB.</p>
        <span class="card-link green">ENTRAR ›</span>
      </a>

      <a href="login.html?perfil=professor" class="profile-card">
        <div class="card-icon-box yellow" aria-hidden="true">
          <i data-lucide="presentation" class="icon"></i>
        </div>
        <h2 class="card-title">Sou Professor</h2>
        <p class="card-subtitle">Acompanhe suas turmas e crie simulados.</p>
        <span class="card-link yellow">ACESSAR PAINEL ›</span>
      </a>
    </div>

    <p class="selection-footer">© 2024 SAEBTrack — Educação Pública do Piauí</p>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/global.js"></script>
</body>
</html>
