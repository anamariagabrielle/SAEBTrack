<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco de Questões — SAEBTrack</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/professor.css">
  <link rel="stylesheet" href="css/banco-questoes.css">
</head>
<body>
  <nav class="navbar navbar-professor" data-navbar>
    <a href="painel-professor.html" class="navbar-logo">
      <img src="images/logo.png" alt="SAEBTrack" class="logo-img">
    </a>
    <button type="button" class="navbar-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="navbar-panel-prof">
      <i data-lucide="menu" class="icon icon-md navbar-icon-menu" aria-hidden="true"></i>
      <i data-lucide="x" class="icon icon-md navbar-icon-close" aria-hidden="true"></i>
    </button>
    <div class="navbar-panel" id="navbar-panel-prof">
      <div class="navbar-panel-user">
        <div class="navbar-user-info">
          <div class="navbar-user-name">Andressa Caroline</div>
          <div class="navbar-user-meta">Língua Portuguesa</div>
        </div>
      </div>
      <ul class="navbar-menu navbar-menu-professor">
        <li>
          <a href="painel-professor.html">
            <i data-lucide="layout-grid" class="icon icon-sm" aria-hidden="true"></i>
            Painel de Turmas
          </a>
        </li>
        <li>
          <a href="banco-questoes.html" class="active teacher-active">
            <i data-lucide="file-text" class="icon icon-sm" aria-hidden="true"></i>
            Banco de Questões
          </a>
        </li>
        <li class="navbar-panel-logout">
          <a href="login.html?perfil=professor" class="navbar-logout-link">
            <i data-lucide="log-out" class="icon icon-sm" aria-hidden="true"></i>
            Sair
          </a>
        </li>
      </ul>
    </div>
    <div class="navbar-user navbar-user-desktop">
      <div class="navbar-user-info">
        <div class="navbar-user-name">Andressa Caroline</div>
        <div class="navbar-user-meta">Língua Portuguesa</div>
      </div>
      <a href="login.html?perfil=professor" class="btn-logout" aria-label="Sair">
        <i data-lucide="log-out" class="icon icon-sm" aria-hidden="true"></i>
      </a>
    </div>
    <div class="navbar-backdrop" aria-hidden="true"></div>
  </nav>

  <main class="page-container">

    <div class="banco-header">
      <span class="banco-header-icon" aria-hidden="true">
        <i data-lucide="circle-plus" class="icon icon-md" aria-hidden="true"></i>
      </span>
      <h1>Banco de Questões</h1>
    </div>

    <div class="banco-layout">
      <section class="nova-questao-card card">
        <h2>Nova Questão</h2>
        <p class="nova-questao-sub">Crie uma questão customizada para suas turmas.</p>

        <form id="form-questao" class="form-questao">
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label" for="disciplina">Disciplina</label>
              <select id="disciplina" name="disciplina" required>
                <option value="LP">Língua Portuguesa</option>
                <option value="MAT">Matemática</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="dificuldade">Dificuldade</label>
              <select id="dificuldade" name="dificuldade" required>
                <option value="Fácil">Fácil</option>
                <option value="Médio" selected>Médio</option>
                <option value="Difícil">Difícil</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="descritor">Descritor-Alvo</label>
            <select id="descritor" name="descritor" required>
              <option value="" disabled selected>Selecione...</option>
              <option value="D03">D03 — Inferir informação implícita</option>
              <option value="D06">D06 — Pontuação e sinais</option>
              <option value="D07">D07 — Identificar gênero textual</option>
              <option value="D12">D12 — Identificar conectivos</option>
              <option value="D16">D16 — Analisar funções da linguagem</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="enunciado">Enunciado</label>
            <textarea id="enunciado" name="enunciado" rows="4" placeholder="Digite o texto da questão..." required></textarea>
          </div>

          <fieldset class="alternativas-form">
            <legend class="form-label">Alternativas e Correta</legend>
            <div class="alternativa-form-row selecionada" data-index="0">
              <label class="alt-radio-label">
                <input type="radio" name="correta" value="0" class="alt-radio" checked>
                <span class="alt-letra">A</span>
              </label>
              <input type="text" class="alt-input" name="alt0" placeholder="Alternativa A" required>
            </div>
            <div class="alternativa-form-row" data-index="1">
              <label class="alt-radio-label">
                <input type="radio" name="correta" value="1" class="alt-radio">
                <span class="alt-letra">B</span>
              </label>
              <input type="text" class="alt-input" name="alt1" placeholder="Alternativa B" required>
            </div>
            <div class="alternativa-form-row" data-index="2">
              <label class="alt-radio-label">
                <input type="radio" name="correta" value="2" class="alt-radio">
                <span class="alt-letra">C</span>
              </label>
              <input type="text" class="alt-input" name="alt2" placeholder="Alternativa C" required>
            </div>
            <div class="alternativa-form-row" data-index="3">
              <label class="alt-radio-label">
                <input type="radio" name="correta" value="3" class="alt-radio">
                <span class="alt-letra">D</span>
              </label>
              <input type="text" class="alt-input" name="alt3" placeholder="Alternativa D" required>
            </div>
          </fieldset>

          <button type="submit" class="btn-primary btn-salvar btn-with-icon">
            <i data-lucide="check" class="icon icon-sm" aria-hidden="true"></i>
            Salvar Questão
          </button>
        </form>
      </section>

      <section class="questoes-cadastradas">
        <h2 class="questoes-cadastradas-titulo">
          Questões Cadastradas (<span id="questoes-count">2</span>)
        </h2>
        <div class="questoes-lista" id="lista-questoes">
          <!-- preenchido por JS -->
        </div>
      </section>
    </div>

  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/global.js"></script>
  <script src="js/banco-questoes.js"></script>
</body>
</html>
