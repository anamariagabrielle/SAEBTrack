<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — SAEBTrack</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="page-auth">
  <div class="cadastro-card">
    <div class="auth-logo">
      <img src="images/logo.png" alt="SAEBTrack" class="logo-img">
    </div>

    <h1 class="auth-title">Criar Nova Conta</h1>
    <p class="auth-subtitle">Junte-se ao SAEBTrack hoje mesmo.</p>

    <form id="cadastro-form">
      <div class="form-group">
        <span class="form-label">Eu sou:</span>
        <div class="perfil-toggle">
          <button type="button" class="toggle-btn active" id="btn-aluno">
            <span class="toggle-dot active"></span>
            <i data-lucide="graduation-cap" class="icon icon-sm" aria-hidden="true"></i>
            Aluno
          </button>
          <button type="button" class="toggle-btn" id="btn-professor">
            <span class="toggle-dot"></span>
            <i data-lucide="presentation" class="icon icon-sm" aria-hidden="true"></i>
            Professor
          </button>
        </div>
      </div>

      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label" for="nome">Nome Completo</label>
          <div class="form-input-wrapper">
            <i data-lucide="user" class="icon icon-sm input-icon" aria-hidden="true"></i>
            <input type="text" id="nome" name="nome" placeholder="João da Silva" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">E-mail Escolar</label>
          <div class="form-input-wrapper">
            <i data-lucide="mail" class="icon icon-sm input-icon" aria-hidden="true"></i>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="joao@escola.edu.br"
              required
            >
          </div>
        </div>
      </div>

      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label" for="senha">Senha</label>
          <div class="form-input-wrapper">
            <i data-lucide="lock" class="icon icon-sm input-icon" aria-hidden="true"></i>
            <input type="password" id="senha" name="senha" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmar-senha">Confirmar Senha</label>
          <div class="form-input-wrapper">
            <i data-lucide="key-round" class="icon icon-sm input-icon" aria-hidden="true"></i>
            <input type="password" id="confirmar-senha" name="confirmar-senha" required>
          </div>
        </div>
      </div>

      <div id="campos-aluno">
        <div class="form-group">
          <label class="form-label" for="escola">Escola</label>
          <div class="form-input-wrapper">
            <i data-lucide="school" class="icon icon-sm input-icon" aria-hidden="true"></i>
            <input type="text" id="escola" name="escola" value="E.E. Raimundo Nonato">
          </div>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label" for="serie">Série</label>
            <div class="form-input-wrapper">
              <i data-lucide="layers" class="icon icon-sm input-icon" aria-hidden="true"></i>
              <select id="serie" name="serie">
                <option value="1">1º Ano</option>
                <option value="2">2º Ano</option>
                <option value="3" selected>3º Ano</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="turma">Turma</label>
            <div class="form-input-wrapper">
              <i data-lucide="users" class="icon icon-sm input-icon" aria-hidden="true"></i>
              <select id="turma" name="turma">
                <option value="3A" selected>3A</option>
                <option value="3B">3B</option>
                <option value="3C">3C</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div id="campos-professor" hidden>
        <div class="form-group">
          <label class="form-label" for="escola-prof">Escola</label>
          <div class="form-input-wrapper">
            <i data-lucide="school" class="icon icon-sm input-icon" aria-hidden="true"></i>
            <input
              type="text"
              id="escola-prof"
              name="escola-prof"
              value="E.E. Raimundo Nonato"
            >
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="disciplina-prof">Disciplina</label>
          <div class="form-input-wrapper">
            <i data-lucide="book-open" class="icon icon-sm input-icon" aria-hidden="true"></i>
            <select id="disciplina-prof" name="disciplina-prof">
              <option value="lp" selected>Língua Portuguesa</option>
              <option value="mat">Matemática</option>
            </select>
          </div>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label" for="serie-prof">Série que leciona</label>
            <div class="form-input-wrapper">
              <i data-lucide="layers" class="icon icon-sm input-icon" aria-hidden="true"></i>
              <select id="serie-prof" name="serie-prof">
                <option value="1">1º Ano</option>
                <option value="2">2º Ano</option>
                <option value="3" selected>3º Ano</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="turma-prof">Turma</label>
            <div class="form-input-wrapper">
              <i data-lucide="users" class="icon icon-sm input-icon" aria-hidden="true"></i>
              <select id="turma-prof" name="turma-prof">
                <option value="3A" selected>3A</option>
                <option value="3B">3B</option>
                <option value="3C">3C</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-primary btn-with-icon">
        Criar conta
        <i data-lucide="user-plus" class="icon icon-sm" aria-hidden="true"></i>
      </button>
    </form>

    <p class="auth-footer">
      Já tem uma conta? <a href="login.html">Entrar</a>
    </p>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/global.js"></script>
  <script>
    (function () {
      const btnAluno = document.getElementById('btn-aluno');
      const btnProfessor = document.getElementById('btn-professor');
      const camposAluno = document.getElementById('campos-aluno');
      const camposProfessor = document.getElementById('campos-professor');
      const escolaAluno = document.getElementById('escola');
      const escolaProf = document.getElementById('escola-prof');
      const disciplinaProf = document.getElementById('disciplina-prof');
      const turmaProf = document.getElementById('turma-prof');

      function setPerfil(isAluno) {
        btnAluno.classList.toggle('active', isAluno);
        btnProfessor.classList.toggle('active', !isAluno);
        btnAluno.querySelector('.toggle-dot').classList.toggle('active', isAluno);
        btnProfessor.querySelector('.toggle-dot').classList.toggle('active', !isAluno);

        camposAluno.hidden = !isAluno;
        camposProfessor.hidden = isAluno;

        escolaAluno.required = isAluno;
        escolaProf.required = !isAluno;
        disciplinaProf.required = !isAluno;
        turmaProf.required = !isAluno;
      }

      btnAluno.addEventListener('click', () => setPerfil(true));
      btnProfessor.addEventListener('click', () => setPerfil(false));

      document.getElementById('cadastro-form').addEventListener('submit', function (e) {
        e.preventDefault();

        const senha = document.getElementById('senha').value;
        const confirmar = document.getElementById('confirmar-senha').value;
        if (senha !== confirmar) {
          alert('As senhas não coincidem.');
          return;
        }

        const isProfessor = btnProfessor.classList.contains('active');

        if (isProfessor) {
          sessionStorage.setItem('professorDisciplina', disciplinaProf.value);
          const serieProf = document.getElementById('serie-prof').value;
          sessionStorage.setItem(
            'professorTurma',
            `Turma ${serieProf}º Ano ${turmaProf.value}`
          );
          sessionStorage.setItem('professorEscola', escolaProf.value.trim());
          sessionStorage.setItem(
            'professorNome',
            document.getElementById('nome').value.trim()
          );
          window.location.href = 'painel-professor.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      });

      setPerfil(true);
    })();
  </script>
</body>
</html>
